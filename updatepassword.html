<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Update Password</title>
</head>
<body>
    <div class="container">
        <div class="red">
            <h3>Red</h3>
        </div>
        <div class="code">
            <h3>Code</h3>
        </div>
        <div class="text">
            <p>Code Your Dreams</p>
        </div>
        <div class="world">
            <h4>
                Learn From World’s<br>
                Best Instructors🌎<br>
                Around The World.
            </h4>
            
        </div>        
        
        <div class="images">
            <div class="image">
                <img src="/images/Code.png" width="50px">
            </div>
            <div class="image1">
                <img src="/images/download (1) 1.png" alt="coding" width="250px">
            </div>
            <div class="image2">
                <img src="/images/download (2).png" width="50px">
            </div>
            <div class="image3">
                <img src="/images/download (3).png" width="60px">
            </div>
            <div class="image4">
                <img src="/images/download 1.png" width="50px">
            </div>
            
        </div>
    </div>
    <div class="form-container">
            <div class="acct" id="new">
                <h4>Enter Your New Password</h4>
            </div>
             
             <form>
                <div class="form">
                    <div id="confirmpassword">
                        <input type="password" placeholder="New Password">
                        <input type="password" placeholder="Confirm Password">
                    </div>

                    <button type="button"><a href="success.html">Confirm</a></button>
                </div> 
             </form>

</html>
