<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    <div class="container">
        <div class="red">
            <h3>Red</h3>
        </div>
        <div class="code">
            <h3>Code</h3>
        </div>
        <div class="text">
            <p>Code Your Dreams</p>
        </div>
        <div class="world">
            <h4>
                Learn From World’s<br>
                Best Instructors🌎<br>
                Around The World.
            </h4>
            
        </div>        
        
        <div class="images">
            <div class="image">
                <img src="/images/Code.png" width="50px">
            </div>
            <div class="image1">
                <img src="/images/download (1) 1.png" alt="coding" width="250px">
            </div>
            <div class="image2">
                <img src="/images/download (2).png" width="50px">
            </div>
            <div class="image3">
                <img src="/images/download (3).png" width="60px">
            </div>
            <div class="image4">
                <img src="/images/download 1.png" width="50px">
            </div>
            
        </div>
    </div>    
        
        <div class="form-container">
            <div class="acct">
                <h4>Login Your Account</h4>
            </div>
             
             <form>
                <div class="form">
                    <div id="email">
                        <input type="email" placeholder="Email">
                    </div>
                    <div id="password">
                        <input type="password" placeholder="Password" required>
                    </div>
                    <section class="forgottenpassword">
                        <p><a href="forgottenpassword.html">forgotten password?</a> </p>
                    </section>
                    
                    <button type="button">Login</button>
                </div> 
             </form>
    
            <div class="line">
                <img src="/images/Sign up more.png">
            </div>
            <div class="social">
                <img src="/images/Social.png">
            </div>
            <div class="signin">
                <p>Don't have an account?<a href="index.html">Create an account</a></p>
            </div> 
        </div>
        
    </div>
</body>
</html>
